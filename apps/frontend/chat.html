<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PTVN Assistant</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #e2e5ea;
        --text: #1c2330;
        --text-muted: #667085;
        --accent: #2f5fde;
        --accent-text: #ffffff;
        --bubble-user: #2f5fde;
        --bubble-user-text: #ffffff;
        --bubble-agent: #ffffff;
        --error: #b42318;
        --shadow: 0 1px 3px rgba(16, 24, 40, 0.08);
        --code-bg: #f6f7f9;
        --code-border: #e2e5ea;
        --quote-bar: #cdd3dd;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #10141c;
          --surface: #1a2030;
          --border: #2a3247;
          --text: #e6e9f0;
          --text-muted: #98a2b3;
          --accent: #5b83f0;
          --bubble-user: #3b62c9;
          --bubble-user-text: #f4f6ff;
          --bubble-agent: #1f2739;
          --error: #f97066;
          --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
          --code-bg: #131926;
          --code-border: #2a3247;
          --quote-bar: #3a4a63;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ---------- Login ---------- */
      .login-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-card {
        width: 100%;
        max-width: 360px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: var(--shadow);
      }
      .login-card h1 {
        margin: 0 0 4px;
        font-size: 22px;
      }
      .login-card p {
        margin: 0 0 24px;
        color: var(--text-muted);
        font-size: 14px;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: var(--text-muted);
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
      }
      .field input:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
      }
      .login-error {
        color: var(--error);
        font-size: 13px;
        min-height: 18px;
        margin: 4px 0 10px;
      }
      .btn-primary {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: var(--accent-text);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: default;
      }

      /* ---------- Chat ---------- */
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .chat-header .title {
        font-weight: 700;
        font-size: 16px;
      }
      .chat-header .who {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: var(--text-muted);
      }
      .chat-header button {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .chat-header .btn-new-chat {
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
        font-weight: 600;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 16px 12px;
      }
      .messages-inner {
        max-width: 760px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg {
        display: flex;
      }
      .msg.user {
        justify-content: flex-end;
      }
      .bubble {
        max-width: 82%;
        padding: 11px 15px;
        border-radius: 16px;
        font-size: 15px;
        line-height: 1.5;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      /* Markdown-rendered bubbles manage their own block spacing. */
      .bubble.md {
        white-space: normal;
      }
      .msg.user .bubble {
        background: var(--bubble-user);
        color: var(--bubble-user-text);
        border-bottom-right-radius: 6px;
      }
      .msg.agent .bubble {
        background: var(--bubble-agent);
        border: 1px solid var(--border);
        border-bottom-left-radius: 6px;
        box-shadow: var(--shadow);
      }
      .msg.agent .bubble.error {
        border-color: var(--error);
        color: var(--error);
      }
      .table-scroll {
        overflow-x: auto;
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      table {
        border-collapse: collapse;
        font-size: 13px;
        width: 100%;
      }
      th,
      td {
        text-align: left;
        padding: 7px 12px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      th {
        color: var(--text-muted);
        font-weight: 600;
        background: color-mix(in srgb, var(--border) 35%, transparent);
      }
      tr:last-child td {
        border-bottom: none;
      }
      /* ---------- Markdown ---------- */
      .md > :first-child {
        margin-top: 0;
      }
      .md > :last-child {
        margin-bottom: 0;
      }
      .md p {
        margin: 0 0 10px;
      }
      .md h1,
      .md h2,
      .md h3,
      .md h4,
      .md h5,
      .md h6 {
        margin: 18px 0 8px;
        line-height: 1.3;
        font-weight: 650;
      }
      .md h1 {
        font-size: 20px;
      }
      .md h2 {
        font-size: 18px;
      }
      .md h3 {
        font-size: 16px;
      }
      .md h4,
      .md h5,
      .md h6 {
        font-size: 15px;
        color: var(--text-muted);
      }
      .md ul,
      .md ol {
        margin: 0 0 10px;
        padding-left: 22px;
      }
      .md li {
        margin: 3px 0;
      }
      .md li > ul,
      .md li > ol {
        margin: 3px 0 0;
      }
      .md a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .md blockquote {
        margin: 0 0 10px;
        padding: 2px 0 2px 14px;
        border-left: 3px solid var(--quote-bar);
        color: var(--text-muted);
      }
      .md hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 14px 0;
      }
      .md img {
        max-width: 100%;
        border-radius: 8px;
      }
      .md code {
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
        font-size: 0.88em;
      }
      /* Inline code only — code inside <pre> inherits the block styling. */
      .md :not(pre) > code {
        background: var(--code-bg);
        border: 1px solid var(--code-border);
        border-radius: 5px;
        padding: 1px 5px;
      }
      .md-code {
        margin: 0 0 10px;
        border: 1px solid var(--code-border);
        border-radius: 10px;
        overflow: hidden;
        background: var(--code-bg);
      }
      .md-code-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 5px 8px 5px 12px;
        border-bottom: 1px solid var(--code-border);
        font-size: 12px;
        color: var(--text-muted);
      }
      .md-code-lang {
        text-transform: lowercase;
        letter-spacing: 0.02em;
      }
      .md-copy {
        border: 1px solid var(--code-border);
        background: var(--surface);
        color: var(--text-muted);
        border-radius: 6px;
        padding: 3px 9px;
        font-size: 12px;
        cursor: pointer;
      }
      .md-copy:hover {
        color: var(--text);
      }
      .md-code pre {
        margin: 0;
        padding: 12px;
        overflow-x: auto;
      }
      .md-code code {
        white-space: pre;
      }
      /* Prose tables wrap; data tables from tool runs keep their nowrap scroll. */
      .md .table-scroll {
        margin: 0 0 10px;
      }
      .md-table th,
      .md-table td {
        white-space: normal;
      }

      .approve-row {
        margin-top: 10px;
      }
      .approve-row button {
        border: none;
        background: var(--accent);
        color: var(--accent-text);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .approve-row button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .typing {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        padding: 6px 2px;
      }
      .typing i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        animation: blink 1.2s infinite;
      }
      .typing i:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing i:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        60%,
        100% {
          opacity: 0.25;
        }
        30% {
          opacity: 1;
        }
      }

      .composer {
        padding: 12px 16px 20px;
        background: var(--bg);
      }
      .composer-inner {
        max-width: 760px;
        margin: 0 auto;
        display: flex;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 8px 8px 8px 16px;
        box-shadow: var(--shadow);
      }
      .composer textarea {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 15px;
        resize: none;
        max-height: 140px;
        padding: 8px 0;
      }
      .composer textarea:focus {
        outline: none;
      }
      .composer button {
        align-self: flex-end;
        border: none;
        background: var(--accent);
        color: var(--accent-text);
        width: 38px;
        height: 38px;
        border-radius: 10px;
        font-size: 17px;
        cursor: pointer;
      }
      .composer button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      /* ---------- Tools drawer ---------- */
      .chat-header .btn-tools {
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
        font-weight: 600;
      }
      /* Native <dialog>, docked full-height to the right edge as a drawer. */
      .drawer {
        width: min(440px, 100%);
        max-width: 100vw;
        height: 100vh;
        max-height: 100vh;
        margin: 0 0 0 auto;
        padding: 0;
        border: none;
        background: var(--surface);
        border-left: 1px solid var(--border);
        color: var(--text);
        flex-direction: column;
        box-shadow: -8px 0 28px rgba(16, 24, 40, 0.22);
      }
      .drawer[open] {
        display: flex;
      }
      .drawer::backdrop {
        background: rgba(16, 24, 40, 0.45);
      }
      .drawer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px 4px;
      }
      .drawer-head h2 {
        margin: 0;
        font-size: 18px;
      }
      .drawer-close {
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-size: 17px;
        line-height: 1;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 8px;
      }
      .drawer-close:hover {
        color: var(--text);
      }
      .drawer-sub {
        margin: 0;
        padding: 2px 20px 12px;
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 4px 20px 24px;
      }
      .tools-note {
        margin: 0 0 14px;
        padding: 9px 11px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text-muted);
        font-size: 13px;
      }
      .tools-empty {
        color: var(--text-muted);
        font-size: 14px;
      }
      .tool-group {
        margin-bottom: 20px;
      }
      .tool-group-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 8px;
      }
      .tool-group-name {
        font-weight: 650;
        font-size: 14px;
      }
      .tool-group-count {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .tool-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
        background: var(--bg);
      }
      .tool-name {
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
        font-size: 13px;
        color: var(--accent);
        overflow-wrap: anywhere;
      }
      .tool-desc {
        margin-top: 4px;
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.45;
      }
      .tool-group-empty {
        font-size: 13px;
        color: var(--text-muted);
        font-style: italic;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Login -->
    <div class="login-wrap" id="loginView">
      <form class="login-card" id="loginForm">
        <h1>PTVN Assistant</h1>
        <p>Sign in to start chatting.</p>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="login-error" id="loginError"></div>
        <button class="btn-primary" id="loginBtn" type="submit">Sign in</button>
      </form>
    </div>

    <!-- Chat -->
    <header class="chat-header" id="chatHeader" hidden>
      <span class="title" id="chatTitle">PTVN Assistant</span>
      <span class="who">
        <button id="newChatBtn" class="btn-new-chat" type="button">＋ New chat</button>
        <button id="toolsBtn" class="btn-tools" type="button" title="See what I can do">
          🛠 Tools
        </button>
        <span id="whoAmI"></span>
        <button id="logoutBtn" type="button">Sign out</button>
      </span>
    </header>
    <main class="messages" id="messagesView" hidden>
      <div class="messages-inner" id="messages"></div>
    </main>
    <footer class="composer" id="composerView" hidden>
      <div class="composer-inner">
        <textarea
          id="messageInput"
          rows="1"
          placeholder="Ask anything…"
          autocomplete="off"
        ></textarea>
        <button id="sendBtn" type="button" title="Send" aria-label="Send">➤</button>
      </div>
    </footer>

    <!-- Tools drawer: the MCP tools this signed-in user is allowed to use -->
    <dialog class="drawer" id="toolsPanel" aria-labelledby="toolsHeading">
      <div class="drawer-head">
        <h2 id="toolsHeading">What I can do</h2>
        <button class="drawer-close" id="toolsCloseBtn" type="button" aria-label="Close">
          ✕
        </button>
      </div>
      <p class="drawer-sub">
        Tools you're allowed to use. I'll pick the right one for you
        automatically when you ask.
      </p>
      <div class="drawer-body" id="toolsBody"></div>
    </dialog>

    <script>
      "use strict";

      const ASSISTANT_AGENT = "assistant";
      const POLL_INTERVAL_MS = 800;
      const POLL_MAX_ATTEMPTS = 60;
      // Defaults when the gateway's /ui/config carries no assistant persona.
      const DEFAULT_TITLE = "PTVN Assistant";
      const DEFAULT_WELCOME_MESSAGE =
        "Hi! I can answer general questions and look up world and " +
        "procurement data for you. What would you like to know?";

      const state = {
        config: null,
        catalog: null,
        token: "",
        username: "",
        threadId: "",
        busy: false,
      };

      const els = {
        loginView: document.getElementById("loginView"),
        loginForm: document.getElementById("loginForm"),
        loginBtn: document.getElementById("loginBtn"),
        loginError: document.getElementById("loginError"),
        username: document.getElementById("username"),
        password: document.getElementById("password"),
        chatHeader: document.getElementById("chatHeader"),
        chatTitle: document.getElementById("chatTitle"),
        messagesView: document.getElementById("messagesView"),
        messages: document.getElementById("messages"),
        composerView: document.getElementById("composerView"),
        messageInput: document.getElementById("messageInput"),
        sendBtn: document.getElementById("sendBtn"),
        whoAmI: document.getElementById("whoAmI"),
        logoutBtn: document.getElementById("logoutBtn"),
        newChatBtn: document.getElementById("newChatBtn"),
        toolsBtn: document.getElementById("toolsBtn"),
        toolsPanel: document.getElementById("toolsPanel"),
        toolsCloseBtn: document.getElementById("toolsCloseBtn"),
        toolsBody: document.getElementById("toolsBody"),
      };

      /* ---------- View state ---------- */

      function showLogin(errorMessage = "") {
        state.token = "";
        // The tool catalog is per-user; drop it so the next sign-in refetches.
        state.catalog = null;
        if (els.toolsPanel.open) {
          els.toolsPanel.close();
        }
        els.loginView.hidden = false;
        els.chatHeader.hidden = true;
        els.messagesView.hidden = true;
        els.composerView.hidden = true;
        els.loginError.textContent = errorMessage;
        els.messages.replaceChildren();
      }

      function showChat() {
        const assistant = (state.config && state.config.assistant) || {};
        els.loginView.hidden = true;
        els.chatHeader.hidden = false;
        els.messagesView.hidden = false;
        els.composerView.hidden = false;
        els.chatTitle.textContent = assistant.name || DEFAULT_TITLE;
        document.title = assistant.name || DEFAULT_TITLE;
        els.whoAmI.textContent = state.username;
        startNewChat();
      }

      function newThreadId() {
        return (
          (window.crypto && crypto.randomUUID && crypto.randomUUID()) ||
          `thread-${Date.now()}-${Math.random().toString(36).slice(2)}`
        );
      }

      // Drops the transcript and starts a fresh server-side thread. A run that
      // is still in flight writes into its now-detached bubble and is ignored.
      function startNewChat() {
        const assistant = (state.config && state.config.assistant) || {};
        state.threadId = newThreadId();
        state.busy = false;
        els.sendBtn.disabled = false;
        els.messages.replaceChildren();
        els.messageInput.value = "";
        autosize();
        addAgentMarkdown(assistant.welcomeMessage || DEFAULT_WELCOME_MESSAGE);
        els.messageInput.focus();
      }

      /* ---------- Markdown ----------
         A small CommonMark-ish renderer: enough for what the agents emit
         (headings, lists, tables, code, emphasis, links) without pulling a
         library into this single-file UI. All text is escaped before any
         markup is produced, and link targets are scheme-checked. */

      const MD_FENCE = /^ {0,3}(`{3,}|~{3,})\s*([\w+#.-]*)\s*$/;
      const MD_FENCE_CLOSE = /^ {0,3}(`{3,}|~{3,})\s*$/;
      const MD_HEADING = /^ {0,3}(#{1,6})\s+(.*?)\s*#*\s*$/;
      const MD_HR = /^ {0,3}([-*_])[ \t]*(?:\1[ \t]*){2,}$/;
      const MD_QUOTE = /^ {0,3}>[ \t]?(.*)$/;
      const MD_UL = /^([ \t]*)([-*+])[ \t]+(.*)$/;
      const MD_OL = /^([ \t]*)(\d{1,9})[.)][ \t]+(.*)$/;
      const MD_TABLE_DIVIDER =
        /^[ \t]*\|?[ \t]*:?-+:?[ \t]*(\|[ \t]*:?-+:?[ \t]*)*\|?[ \t]*$/;
      const SAFE_URL = /^(?:https?:\/\/|mailto:|tel:|#|\/|\.{1,2}\/)/i;
      const BARE_EMAIL = /^[\w.+-]+@[\w-]+\.[\w.-]+$/;

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      // Returns a usable href, or null when the scheme isn't one we allow
      // (blocks javascript:, data:, and friends).
      function safeUrl(url) {
        const trimmed = String(url).trim();
        if (SAFE_URL.test(trimmed)) {
          return trimmed;
        }
        if (BARE_EMAIL.test(trimmed)) {
          return `mailto:${trimmed}`;
        }
        if (/^www\./i.test(trimmed)) {
          return `https://${trimmed}`;
        }
        return null;
      }

      function indentWidth(line) {
        return /^[ \t]*/.exec(line)[0].replaceAll("\t", "    ").length;
      }

      function startsBlock(line) {
        return (
          MD_FENCE.test(line) ||
          MD_HEADING.test(line) ||
          MD_HR.test(line) ||
          MD_QUOTE.test(line) ||
          MD_UL.test(line) ||
          MD_OL.test(line)
        );
      }

      function isTableStart(lines, index) {
        return (
          lines[index].includes("|") &&
          index + 1 < lines.length &&
          lines[index + 1].includes("-") &&
          MD_TABLE_DIVIDER.test(lines[index + 1])
        );
      }

      function splitTableRow(line) {
        return line
          .trim()
          .replace(/^\|/, "")
          .replace(/\|$/, "")
          .split("|")
          .map((cell) => cell.trim());
      }

      /* ----- inline ----- */

      // Code spans, links, images and bare URLs are pulled out into
      // placeholders first so escaping and emphasis can't corrupt them.
      function renderInline(text) {
        const tokens = [];
        const hold = (html) => `\u0000${tokens.push(html) - 1}\u0000`;

        let working = String(text).replaceAll("\u0000", "");

        working = working.replace(/(`+)([^`]|[^`][\s\S]*?)\1(?!`)/g, (_, __, code) =>
          hold(`<code>${escapeHtml(code.replace(/^ | $/g, ""))}</code>`),
        );

        working = working.replace(
          /!\[([^\]]*)\]\(\s*([^)\s]+)(?:\s+"[^"]*")?\s*\)/g,
          (whole, alt, url) => {
            const href = safeUrl(url);
            return href
              ? hold(
                  `<img src="${escapeHtml(href)}" alt="${escapeHtml(alt)}" loading="lazy" />`,
                )
              : whole; // left for the global escape pass below
          },
        );

        working = working.replace(
          /\[([^\]]*)\]\(\s*([^)\s]+)(?:\s+"[^"]*")?\s*\)/g,
          (whole, label, url) => {
            const href = safeUrl(url);
            return href
              ? hold(
                  `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${renderInline(label)}</a>`,
                )
              : whole; // left for the global escape pass below
          },
        );

        working = working.replace(
          /(^|[\s(])((?:https?:\/\/|www\.)[^\s<>()]+[^\s<>().,;:!?'"])/g,
          (whole, lead, url) => {
            const href = safeUrl(url);
            return href
              ? `${lead}${hold(
                  `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`,
                )}`
              : whole;
          },
        );

        working = escapeHtml(working)
          .replace(/\*\*\*([\s\S]+?)\*\*\*/g, "<strong><em>$1</em></strong>")
          .replace(/\*\*([\s\S]+?)\*\*/g, "<strong>$1</strong>")
          .replace(/__([\s\S]+?)__/g, "<strong>$1</strong>")
          .replace(/~~([\s\S]+?)~~/g, "<del>$1</del>")
          .replace(/(^|[^\w*])\*(?!\s)([^*\n]+?)\*(?!\w)/g, "$1<em>$2</em>")
          .replace(/(^|[^\w_])_(?!\s)([^_\n]+?)_(?!\w)/g, "$1<em>$2</em>");

        return working.replace(/\u0000(\d+)\u0000/g, (_, index) => tokens[Number(index)]);
      }

      /* ----- blocks ----- */

      function renderCodeBlock(code, language) {
        const label = language ? escapeHtml(language) : "code";
        return (
          `<div class="md-code"><div class="md-code-head">` +
          `<span class="md-code-lang">${label}</span>` +
          `<button class="md-copy" type="button">Copy</button></div>` +
          `<pre><code>${escapeHtml(code)}</code></pre></div>`
        );
      }

      function renderTable(lines, start) {
        const headers = splitTableRow(lines[start]);
        const alignments = splitTableRow(lines[start + 1]).map((cell) => {
          const left = cell.startsWith(":");
          const right = cell.endsWith(":");
          if (left && right) return "center";
          if (right) return "right";
          return left ? "left" : "";
        });
        const align = (index) =>
          alignments[index] ? ` style="text-align:${alignments[index]}"` : "";

        let index = start + 2;
        const body = [];
        while (index < lines.length && lines[index].includes("|") && lines[index].trim()) {
          body.push(splitTableRow(lines[index]));
          index += 1;
        }

        const head = headers
          .map((cell, position) => `<th${align(position)}>${renderInline(cell)}</th>`)
          .join("");
        const rows = body
          .map(
            (cells) =>
              `<tr>${headers
                .map(
                  (_, position) =>
                    `<td${align(position)}>${renderInline(cells[position] ?? "")}</td>`,
                )
                .join("")}</tr>`,
          )
          .join("");

        return {
          html:
            `<div class="table-scroll md-table"><table><thead><tr>${head}</tr></thead>` +
            `<tbody>${rows}</tbody></table></div>`,
          next: index,
        };
      }

      function renderList(lines, start) {
        const first = MD_UL.exec(lines[start]) || MD_OL.exec(lines[start]);
        const ordered = !MD_UL.test(lines[start]);
        const baseIndent = indentWidth(lines[start]);
        const stripWidth = baseIndent + first[2].length + 1;
        const items = [];
        let current = null;
        let index = start;

        while (index < lines.length) {
          const line = lines[index];
          const item = MD_UL.exec(line) || MD_OL.exec(line);
          const isItem = Boolean(item);
          const width = indentWidth(line);

          if (isItem && width <= baseIndent) {
            // A shallower marker, or a switch between bullets and numbers,
            // belongs to a different list.
            if (width < baseIndent || !MD_UL.test(line) !== ordered) {
              break;
            }
            current = [item[3]];
            items.push(current);
            index += 1;
            continue;
          }

          if (!line.trim()) {
            const next = lines[index + 1];
            const continues =
              next !== undefined &&
              next.trim() &&
              (indentWidth(next) > baseIndent ||
                ((MD_UL.test(next) || MD_OL.test(next)) &&
                  indentWidth(next) === baseIndent));
            if (!continues) {
              break;
            }
            if (current) {
              current.push("");
            }
            index += 1;
            continue;
          }

          if (width > baseIndent && current) {
            current.push(line.slice(Math.min(width, stripWidth)));
            index += 1;
            continue;
          }

          break;
        }

        const rendered = items
          .map((itemLines) => {
            const html = renderBlocks(itemLines);
            // Tight items: unwrap the leading paragraph (so "text + nested list"
            // items stay compact). Items with several paragraphs stay loose.
            const lead = /^<p>([\s\S]*?)<\/p>([\s\S]*)$/.exec(html);
            const tight = lead && !lead[2].includes("<p>");
            return `<li>${tight ? lead[1] + lead[2] : html}</li>`;
          })
          .join("");
        const tag = ordered ? "ol" : "ul";
        const startAttr =
          ordered && first[2] !== "1" ? ` start="${Number(first[2])}"` : "";

        return { html: `<${tag}${startAttr}>${rendered}</${tag}>`, next: index };
      }

      function renderBlocks(lines) {
        const out = [];
        let index = 0;

        while (index < lines.length) {
          const line = lines[index];

          if (!line.trim()) {
            index += 1;
            continue;
          }

          const fence = MD_FENCE.exec(line);
          if (fence) {
            const marker = fence[1][0];
            const length = fence[1].length;
            const body = [];
            index += 1;
            while (index < lines.length) {
              const close = MD_FENCE_CLOSE.exec(lines[index]);
              if (close && close[1][0] === marker && close[1].length >= length) {
                break;
              }
              body.push(lines[index]);
              index += 1;
            }
            index += 1;
            out.push(renderCodeBlock(body.join("\n"), fence[2]));
            continue;
          }

          if (MD_HR.test(line)) {
            out.push("<hr />");
            index += 1;
            continue;
          }

          const heading = MD_HEADING.exec(line);
          if (heading) {
            const level = heading[1].length;
            out.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
            index += 1;
            continue;
          }

          if (MD_QUOTE.test(line)) {
            const body = [];
            while (index < lines.length && MD_QUOTE.test(lines[index])) {
              body.push(MD_QUOTE.exec(lines[index])[1]);
              index += 1;
            }
            out.push(`<blockquote>${renderBlocks(body)}</blockquote>`);
            continue;
          }

          if (MD_UL.test(line) || MD_OL.test(line)) {
            const list = renderList(lines, index);
            out.push(list.html);
            index = list.next;
            continue;
          }

          if (isTableStart(lines, index)) {
            const table = renderTable(lines, index);
            out.push(table.html);
            index = table.next;
            continue;
          }

          const paragraph = [];
          while (
            index < lines.length &&
            lines[index].trim() &&
            !startsBlock(lines[index]) &&
            !isTableStart(lines, index)
          ) {
            paragraph.push(lines[index].trim());
            index += 1;
          }
          if (paragraph.length) {
            out.push(`<p>${renderInline(paragraph.join("\n")).replaceAll("\n", "<br />")}</p>`);
          } else {
            // Defensive: never spin if a line matched nothing above.
            index += 1;
          }
        }

        return out.join("");
      }

      function renderMarkdown(text) {
        return renderBlocks(String(text ?? "").replaceAll("\r\n", "\n").split("\n"));
      }

      /* ---------- Message rendering ---------- */

      function scrollToBottom() {
        els.messagesView.scrollTop = els.messagesView.scrollHeight;
      }

      function addBubble(role) {
        const msg = document.createElement("div");
        msg.className = `msg ${role}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        msg.append(bubble);
        els.messages.append(msg);
        scrollToBottom();
        return bubble;
      }

      function addUserText(text) {
        addBubble("user").textContent = text;
      }

      function addAgentText(text, { error = false } = {}) {
        const bubble = addBubble("agent");
        if (error) {
          bubble.classList.add("error");
        }
        bubble.textContent = text;
        return bubble;
      }

      // Agent prose is markdown; user input and error strings stay plain text.
      function setMarkdown(bubble, text) {
        bubble.classList.add("md");
        bubble.innerHTML = renderMarkdown(text);
        scrollToBottom();
        return bubble;
      }

      function addAgentMarkdown(text) {
        return setMarkdown(addBubble("agent"), text);
      }

      function addTyping() {
        const bubble = addBubble("agent");
        const typing = document.createElement("span");
        typing.className = "typing";
        typing.append(
          document.createElement("i"),
          document.createElement("i"),
          document.createElement("i"),
        );
        bubble.append(typing);
        return bubble;
      }

      function renderRowsTable(bubble, rows) {
        if (!Array.isArray(rows) || !rows.length) {
          return;
        }
        const columns = Object.keys(rows[0]);
        const wrap = document.createElement("div");
        wrap.className = "table-scroll";
        const table = document.createElement("table");

        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        columns.forEach((column) => {
          const th = document.createElement("th");
          th.textContent = column.replaceAll("_", " ");
          headRow.append(th);
        });
        thead.append(headRow);

        const tbody = document.createElement("tbody");
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          columns.forEach((column) => {
            const td = document.createElement("td");
            const value = row[column];
            td.textContent = value === null || value === undefined ? "—" : String(value);
            tr.append(td);
          });
          tbody.append(tr);
        });

        table.append(thead, tbody);
        wrap.append(table);
        bubble.append(wrap);
        scrollToBottom();
      }

      function summarizeRun(run) {
        const rows = run.result?.output?.rows;
        if (Array.isArray(rows)) {
          return rows.length
            ? `Here's what I found — ${rows.length} row(s):`
            : "The lookup ran successfully but returned no rows.";
        }
        const reportId = run.result?.output?.report_id;
        if (reportId) {
          return `Your report is ready: ${reportId}.`;
        }
        return run.output || "Done.";
      }

      function renderFinishedRun(bubble, run) {
        bubble.replaceChildren();
        bubble.classList.remove("md");
        if (run.status === "failed") {
          bubble.classList.add("error");
          bubble.textContent =
            "Sorry — I couldn't complete that request. Please try rephrasing it.";
          return;
        }
        if (run.status === "denied") {
          // `output` explains the refusal in the assistant's voice; the raw
          // `denied_reason` is the audit string and only a last resort here.
          bubble.textContent =
            run.output ||
            run.denied_reason ||
            "Sorry — you don't have permission for that request.";
          return;
        }
        setMarkdown(bubble, summarizeRun(run));
        renderRowsTable(bubble, run.result?.output?.rows);
      }

      function renderApprovalRequest(bubble, runId) {
        bubble.replaceChildren();
        bubble.textContent =
          "This request needs a human sign-off before I can continue.";
        const row = document.createElement("div");
        row.className = "approve-row";
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = "Approve request";
        button.addEventListener("click", async () => {
          button.disabled = true;
          button.textContent = "Approving…";
          try {
            const run = await api("POST", `/runs/${runId}/approve`);
            renderFinishedRun(bubble, run);
          } catch (error) {
            addAgentText(`Approval failed: ${error.message}`, { error: true });
            button.disabled = false;
            button.textContent = "Approve request";
          }
        });
        row.append(button);
        bubble.append(row);
        scrollToBottom();
      }

      /* ---------- API ---------- */

      class AuthError extends Error {}

      async function api(method, path, body) {
        const response = await fetch(path, {
          method,
          headers: {
            Authorization: `Bearer ${state.token}`,
            ...(body ? { "Content-Type": "application/json" } : {}),
          },
          body: body ? JSON.stringify(body) : undefined,
        });
        let data = null;
        try {
          data = await response.json();
        } catch (error) {
          data = null;
        }
        if (response.status === 401) {
          throw new AuthError("Your session expired. Please sign in again.");
        }
        if (!response.ok) {
          throw new Error(data?.detail || `Request failed (${response.status})`);
        }
        return data;
      }

      async function pollRun(runId) {
        for (let attempt = 0; attempt < POLL_MAX_ATTEMPTS; attempt += 1) {
          const run = await api("GET", `/runs/${runId}`);
          if (!["requested", "running"].includes(run.status)) {
            return run;
          }
          await new Promise((resolve) => setTimeout(resolve, POLL_INTERVAL_MS));
        }
        throw new Error("The request is taking too long. Please try again.");
      }

      /* ---------- Tools catalog ----------
         /catalog is authenticated and permission-filtered by the gateway:
         each MCP server carries an `allowed` flag, and its `tools` array
         (name + description) is only populated for servers this user may
         execute. So the panel simply shows every allowed server's tools —
         a plain-language view of what the assistant can do on the user's
         behalf. */

      async function loadCatalog() {
        if (!state.catalog) {
          state.catalog = await api("GET", "/catalog");
        }
        return state.catalog;
      }

      // "world-mcp" -> "World MCP". The catalog carries no display name for
      // MCP servers, so make the id a little more legible.
      function humanizeServer(id) {
        return String(id)
          .split(/[-_]+/)
          .filter(Boolean)
          .map((word) =>
            word.toLowerCase() === "mcp"
              ? "MCP"
              : word.charAt(0).toUpperCase() + word.slice(1),
          )
          .join(" ");
      }

      function toolsMessage(text) {
        const paragraph = document.createElement("p");
        paragraph.className = "tools-empty";
        paragraph.textContent = text;
        return paragraph;
      }

      function renderToolGroup(server) {
        const group = document.createElement("section");
        group.className = "tool-group";

        const tools = Array.isArray(server.tools) ? server.tools : [];
        const head = document.createElement("div");
        head.className = "tool-group-head";
        const name = document.createElement("span");
        name.className = "tool-group-name";
        name.textContent = humanizeServer(server.id);
        head.append(name);
        if (tools.length) {
          const count = document.createElement("span");
          count.className = "tool-group-count";
          count.textContent = `${tools.length} tool${tools.length === 1 ? "" : "s"}`;
          head.append(count);
        }
        group.append(head);

        if (!tools.length) {
          const empty = document.createElement("div");
          empty.className = "tool-group-empty";
          empty.textContent = "No tools available right now.";
          group.append(empty);
          return group;
        }

        tools.forEach((tool) => {
          const card = document.createElement("div");
          card.className = "tool-card";
          const toolName = document.createElement("div");
          toolName.className = "tool-name";
          toolName.textContent = tool.name || "(unnamed tool)";
          card.append(toolName);
          if (tool.description) {
            const description = document.createElement("div");
            description.className = "tool-desc";
            description.textContent = tool.description;
            card.append(description);
          }
          group.append(card);
        });
        return group;
      }

      function renderToolCatalog(catalog) {
        els.toolsBody.replaceChildren();
        const servers = (catalog.mcpServers || []).filter((server) => server.allowed);

        if (!catalog.registryAvailable) {
          const note = document.createElement("p");
          note.className = "tools-note";
          note.textContent =
            "The tool registry is temporarily unreachable, so the live tool " +
            "list may be incomplete.";
          els.toolsBody.append(note);
        }

        if (!servers.length) {
          els.toolsBody.append(
            toolsMessage(
              "You don't currently have permission to use any tools — but I " +
                "can still answer general questions.",
            ),
          );
          return;
        }

        servers.forEach((server) => {
          els.toolsBody.append(renderToolGroup(server));
        });
      }

      async function openTools() {
        if (!els.toolsPanel.open) {
          els.toolsPanel.showModal();
        }
        els.toolsBody.replaceChildren(toolsMessage("Loading tools…"));
        try {
          renderToolCatalog(await loadCatalog());
        } catch (error) {
          if (error instanceof AuthError) {
            els.toolsPanel.close();
            showLogin(error.message);
            return;
          }
          els.toolsBody.replaceChildren(
            toolsMessage(`Couldn't load tools: ${error.message}`),
          );
        }
      }

      function closeTools() {
        if (els.toolsPanel.open) {
          els.toolsPanel.close();
        }
      }

      /* ---------- Chat flow ---------- */

      async function sendMessage() {
        const text = els.messageInput.value.trim();
        if (!text || state.busy) {
          return;
        }
        state.busy = true;
        els.sendBtn.disabled = true;
        els.messageInput.value = "";
        autosize();
        addUserText(text);
        const bubble = addTyping();

        try {
          const started = await api("POST", `/agents/${ASSISTANT_AGENT}/runs`, {
            message: text,
            thread_id: state.threadId,
          });
          const runId = started.run_id;

          if (started.status === "requires_approval") {
            renderApprovalRequest(bubble, runId);
          } else if (started.status === "denied") {
            renderFinishedRun(bubble, started);
          } else {
            // completed (chat/general answers) and running (tool runs) both
            // read the final record from the run store.
            const run =
              started.status === "running" || started.status === "requested"
                ? await pollRun(runId)
                : await api("GET", `/runs/${runId}`);
            if (run.status === "requires_approval") {
              renderApprovalRequest(bubble, runId);
            } else {
              renderFinishedRun(bubble, run);
            }
          }
        } catch (error) {
          if (error instanceof AuthError) {
            showLogin(error.message);
          } else {
            bubble.replaceChildren();
            bubble.classList.add("error");
            bubble.textContent = `Sorry — something went wrong: ${error.message}`;
          }
        } finally {
          state.busy = false;
          els.sendBtn.disabled = false;
          els.messageInput.focus();
        }
      }

      /* ---------- Auth ---------- */

      async function loadConfig() {
        if (state.config) {
          return state.config;
        }
        const response = await fetch("/ui/config");
        if (!response.ok) {
          throw new Error("The gateway is not reachable right now.");
        }
        state.config = await response.json();
        return state.config;
      }

      async function login(event) {
        event.preventDefault();
        els.loginBtn.disabled = true;
        els.loginError.textContent = "";
        try {
          const config = await loadConfig();
          const body = new URLSearchParams();
          body.set("client_id", config.keycloakClientId);
          body.set("grant_type", "password");
          body.set("username", els.username.value);
          body.set("password", els.password.value);
          const response = await fetch(config.keycloakTokenUrl, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body,
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(
              data.error_description || data.error || response.statusText,
            );
          }
          state.token = data.access_token;
          state.username = els.username.value;
          els.password.value = "";
          showChat();
        } catch (error) {
          els.loginError.textContent = `Sign-in failed: ${error.message}`;
        } finally {
          els.loginBtn.disabled = false;
        }
      }

      /* ---------- Wiring ---------- */

      function autosize() {
        els.messageInput.style.height = "auto";
        els.messageInput.style.height = `${Math.min(
          els.messageInput.scrollHeight,
          140,
        )}px`;
      }

      els.loginForm.addEventListener("submit", login);
      els.logoutBtn.addEventListener("click", () => showLogin());
      els.newChatBtn.addEventListener("click", startNewChat);
      els.toolsBtn.addEventListener("click", openTools);
      els.toolsCloseBtn.addEventListener("click", closeTools);
      // A click landing on the dialog element itself is a click on its
      // backdrop (Esc is handled natively by <dialog>).
      els.toolsPanel.addEventListener("click", (event) => {
        if (event.target === els.toolsPanel) {
          closeTools();
        }
      });

      // Copy buttons live inside markdown-generated HTML, so delegate.
      els.messages.addEventListener("click", async (event) => {
        const button = event.target.closest(".md-copy");
        if (!button) {
          return;
        }
        const code = button.closest(".md-code")?.querySelector("code");
        try {
          await navigator.clipboard.writeText(code ? code.textContent : "");
          button.textContent = "Copied";
        } catch (error) {
          button.textContent = "Copy failed";
        }
        setTimeout(() => {
          button.textContent = "Copy";
        }, 1500);
      });
      els.sendBtn.addEventListener("click", sendMessage);
      els.messageInput.addEventListener("input", autosize);
      els.messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      loadConfig().catch(() => {
        els.loginError.textContent =
          "The gateway is not reachable right now. Refresh to retry.";
      });
    </script>
  </body>
</html>
